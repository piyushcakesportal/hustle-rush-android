name: Build Android

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build debug APK and release AAB
        run: gradle --no-daemon :app:assembleDebug :app:bundleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hustle-rush-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload unsigned release AAB
        uses: actions/upload-artifact@v4
        with:
          name: hustle-rush-release-aab-unsigned
          path: app/build/outputs/bundle/release/app-release.aab
